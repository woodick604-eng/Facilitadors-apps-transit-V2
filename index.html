<!doctype html>
<html lang="ca">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Accès Apps Facilitadores Trànsit</title>

  <!-- === PWA — manifest + icones + theme color === -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Hub d'apps facilitadores per a l'agent de Trànsit. Mossos d'Esquadra." />

  <!-- iOS — instal·lable des de Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hub Trànsit" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- === Registre del Service Worker — només en producció (HTTPS) === -->
  <script>
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>

</html>
